name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: Build, lint, test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/clinic_cms_test
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci_dummy_secret_at_least_32_chars_long_xxx

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint
        continue-on-error: true # TODO: legacy lint xatolarini tuzatib bu qatorni olib tashlash

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
